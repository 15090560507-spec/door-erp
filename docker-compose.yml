# ===================== 西州将军铜门 - Docker Compose =====================
version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: door-backend
    ports:
      - "8000:8000"
    environment:
      - DATA_DIR=/app/data
      - TEMPLATE_PATH=/app/template.dxf
      - JWT_SECRET=door-erp-jwt-secret-2026-xizhou
      - ADMIN_PASSWORD=admin888
      - CORS_ORIGINS=http://localhost:3000,http://124.223.87.161:3000,http://124.223.87.161:8000,http://124.223.87.161,https://124.223.87.161
    volumes:
      # 数据持久化：JSON 数据库文件映射到宿主机 ./data 目录，防止重启丢失
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        # 构建时注入：前端在浏览器中请求后端的地址
        NEXT_PUBLIC_API_URL: /api
        INTERNAL_API_URL: http://backend:8000
    container_name: door-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - INTERNAL_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  https-proxy:
    image: nginx:1.27-alpine
    container_name: door-https-proxy
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      - HTTPS_HOST=124.223.87.161
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs
    command: >
      /bin/sh -c "if [ ! -f /etc/nginx/certs/door-erp.crt ] || [ ! -f /etc/nginx/certs/door-erp.key ]; then
      apk add --no-cache openssl >/dev/null &&
      openssl req -x509 -nodes -newkey rsa:2048 -days 3650
      -keyout /etc/nginx/certs/door-erp.key
      -out /etc/nginx/certs/door-erp.crt
      -subj '/CN=door-erp'
      -addext 'subjectAltName=IP:124.223.87.161,DNS:localhost';
      fi;
      nginx -g 'daemon off;'"
    restart: unless-stopped
