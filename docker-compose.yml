# ===================== 西州将军铜门 - Docker Compose =====================
version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: door-backend
    ports:
      - "8000:8000"
    environment:
      - DATA_DIR=/app/data
      - TEMPLATE_PATH=/app/template.dxf
    volumes:
      # 数据持久化：JSON 数据库文件映射到宿主机 ./data 目录，防止重启丢失
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        # 构建时注入：前端在浏览器中请求后端的地址
        NEXT_PUBLIC_API_URL: http://124.223.87.161:8000/api
    container_name: door-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://124.223.87.161:8000/api
    depends_on:
      - backend
    restart: unless-stopped
